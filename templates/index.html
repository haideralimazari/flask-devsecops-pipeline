<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask + MySQL App 🚀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #07080a;
            --surface: #0e1016;
            --surface2: #13151e;
            --border: rgba(255,255,255,0.07);
            --accent: #f97316;
            --accent2: #fb923c;
            --accent-glow: rgba(249, 115, 22, 0.25);
            --text: #f0f0f0;
            --muted: #6b7280;
            --msg-bg: #111318;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient background blobs */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%);
            pointer-events: none;
            animation: drift 12s ease-in-out infinite alternate;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(251,146,60,0.05) 0%, transparent 70%);
            pointer-events: none;
            animation: drift 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes drift {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* Noise overlay */
        .noise {
            position: fixed;
            inset: 0;
            opacity: 0.025;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 128px;
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 540px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03),
                        0 40px 80px rgba(0,0,0,0.6),
                        0 0 80px var(--accent-glow);
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 30px;
        }

        .header-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #c2410c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-text h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }

        .header-text span {
            font-size: 0.78rem;
            color: var(--muted);
            font-weight: 400;
            letter-spacing: 0.04em;
        }

        /* Status pill */
        .status-pill {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.72rem;
            color: #4ade80;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
            50%       { opacity: 0.7; box-shadow: 0 0 0 4px rgba(74,222,128,0); }
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 20px;
        }

        /* Messages section label */
        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }

        /* Messages box */
        .messages {
            background: var(--msg-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 22px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        .msg-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            animation: slideIn 0.3s ease both;
            transition: background 0.2s;
        }

        .msg-item:hover {
            background: rgba(249,115,22,0.05);
            border-color: rgba(249,115,22,0.15);
        }

        .msg-item:last-child {
            margin-bottom: 0;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #c2410c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .msg-content {
            flex: 1;
        }

        .msg-text {
            font-size: 0.88rem;
            color: #d1d5db;
            line-height: 1.5;
        }

        .msg-time {
            font-size: 0.68rem;
            color: var(--muted);
            margin-top: 3px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 24px 0;
            color: var(--muted);
        }

        .empty-state svg {
            margin-bottom: 8px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.82rem;
        }

        /* Input section */
        .input-wrap {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-field {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 13px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .input-field::placeholder {
            color: var(--muted);
        }

        .input-field:focus {
            border-color: rgba(249,115,22,0.5);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #c2410c);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .send-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 24px rgba(249,115,22,0.4);
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.82rem;
            z-index: 100;
            transition: transform 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.03em;
        }

        .footer span {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 520px) {
            .card {
                padding: 24px 20px;
                border-radius: 18px;
            }
            .header-text h1 {
                font-size: 1.15rem;
            }
        }
    </style>
</head>

<body>
    <div class="noise"></div>

    <div class="card">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">🔥</div>
            <div class="header-text">
                <h1>Flask + MySQL</h1>
                <span>Real-time Message Board</span>
            </div>
            <div class="status-pill">
                <div class="status-dot"></div>
                Live
            </div>
        </div>

        <div class="divider"></div>

        <!-- Messages -->
        <div class="section-label">Messages</div>
        <div class="messages" id="messagesBox">
            {% if messages %}
                {% for message in messages %}
                <div class="msg-item">
                    <div class="msg-avatar">💬</div>
                    <div class="msg-content">
                        <div class="msg-text">{{ message[0] }}</div>
                        <div class="msg-time">Just now</div>
                    </div>
                </div>
                {% endfor %}
            {% else %}
            <div class="empty-state" id="emptyState">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <p>No messages yet. Say something!</p>
            </div>
            {% endif %}
        </div>

        <!-- Input -->
        <form id="messageForm">
            <div class="input-wrap">
                <input
                    type="text"
                    name="new_message"
                    class="input-field"
                    placeholder="Type a message..."
                    autocomplete="off"
                    required
                />
                <button type="submit" class="send-btn" aria-label="Send">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/>
                    </svg>
                </button>
            </div>
        </form>

        <div class="footer">
            Built with <span>Flask</span> · MySQL · Python
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function showToast(msg, isError = false) {
            const t = $('#toast');
            t.text(msg).css('border-color', isError ? 'rgba(239,68,68,0.3)' : 'rgba(249,115,22,0.3)');
            t.addClass('show');
            setTimeout(() => t.removeClass('show'), 2800);
        }

        function addMessage(text) {
            const emptyState = $('#emptyState');
            if (emptyState.length) emptyState.remove();

            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const html = `
                <div class="msg-item">
                    <div class="msg-avatar">💬</div>
                    <div class="msg-content">
                        <div class="msg-text">${$('<div>').text(text).html()}</div>
                        <div class="msg-time">${now}</div>
                    </div>
                </div>`;
            $('#messagesBox').append(html);
            const box = document.getElementById('messagesBox');
            box.scrollTop = box.scrollHeight;
        }

        $(document).ready(function () {
            // Scroll to bottom on load
            const box = document.getElementById('messagesBox');
            box.scrollTop = box.scrollHeight;

            $("#messageForm").on("submit", function (e) {
                e.preventDefault();
                const input = $("input[name='new_message']");
                const msg = input.val().trim();

                if (!msg) return;

                const btn = $('.send-btn');
                btn.css('opacity', '0.6').prop('disabled', true);

                $.ajax({
                    url: "/submit",
                    type: "POST",
                    data: { new_message: msg },
                    success: function (response) {
                        if (response && response.message) {
                            addMessage(response.message);
                            input.val('');
                            showToast('Message sent ✓');
                        }
                    },
                    error: function () {
                        showToast('Failed to send. Try again.', true);
                    },
                    complete: function () {
                        btn.css('opacity', '1').prop('disabled', false);
                        input.focus();
                    }
                });
            });
        });
    </script>
</body>
</html>
