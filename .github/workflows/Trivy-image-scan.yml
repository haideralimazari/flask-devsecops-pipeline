name: Image Scan

on:
  workflow_call:

jobs:
  Trivy-image-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Scan Image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/flask-app:latest
          severity: CRITICAL,HIGH
          exit-code: 1